name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run compile
      - name: Unit tests
        run: npm test
      - name: Package (smoke-test vsce packaging)
        run: npx @vscode/vsce package --out /tmp/extension.vsix
